{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام إدارة شؤون الجرحى</title>
    <style>
        :root {
            --primary-dark: #062f28;
            --primary-gold: #a89568;
            --bg-light: #f4f7f6;
            --text-dark: #1a1a1a;
            --white: #ffffff;
            --danger: #a93226;
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: Tahoma, Arial, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-panel {
            width: 100%;
            max-width: 430px;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .login-header {
            background: var(--primary-dark);
            color: var(--white);
            padding: 28px;
            border-bottom: 4px solid var(--primary-gold);
            text-align: center;
        }

        .login-header img {
            width: 82px;
            height: 82px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .login-header h1 {
            font-size: 22px;
            margin: 0;
        }

        .login-body {
            padding: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            border: 1px solid #ccd1d1;
            border-radius: 5px;
            padding: 11px 12px;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 3px rgba(168, 149, 104, 0.2);
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 5px;
            background: var(--primary-dark);
            color: var(--white);
            padding: 12px 18px;
            cursor: pointer;
            font-family: Tahoma, Arial, sans-serif;
            font-weight: 700;
            font-size: 15px;
        }

        .btn:hover {
            background: #084339;
        }

        .error-box {
            background: #fdecea;
            color: var(--danger);
            border-right: 4px solid var(--danger);
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="login-panel">
        <div class="login-header">
            <img src="{% static 'reception/images/logo.jpg' %}" alt="وزارة الدفاع">
            <h1>تسجيل الدخول إلى النظام</h1>
        </div>

        <div class="login-body">
            {% if form.errors %}
                <div class="error-box">اسم المستخدم أو كلمة المرور غير صحيحة.</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div class="form-group">
                    <label for="{{ form.username.id_for_label }}">اسم المستخدم</label>
                    {{ form.username }}
                </div>

                <div class="form-group">
                    <label for="{{ form.password.id_for_label }}">كلمة المرور</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="btn">دخول</button>
            </form>
        </div>
    </main>
</body>
</html>
